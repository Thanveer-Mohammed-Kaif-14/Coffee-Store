<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar</title>

    <link rel="stylesheet" href="./Css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar"></nav>
    <div class="cart-sided"></div>

    <div class="shop-container">
      <div class="filters">
        <div class="search-box">
          <input
            type="text"
            id="search"
            class="input"
            placeholder="Search Coffee..."
          />
        </div>

        <div class="filter-section">
          <h3>Categories</h3>

          <div class="filt-btn">
            <button class="active" data-category="all">All</button>
            <button data-category="Hot Coffee">Hot Coffee</button>
            <button data-category="Cold Coffee">Cold Coffee</button>
          </div>
        </div>

        <div class="filter-section">
          <h3>Price Range</h3>

          <label>
            <input type="radio" name="price" value="low" />
            Under ₹200
          </label>

          <label>
            <input type="radio" name="price" value="medium" />
            ₹200 - ₹300
          </label>

          <label>
            <input type="radio" name="price" value="high" />
            Above ₹300
          </label>
        </div>
      </div>

      <div class="all-product"></div>
    </div>

    <div class="footer"></div>

    <script src="./Js/shop.js" type="module"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init()
    </script>
  </body>
</html>
